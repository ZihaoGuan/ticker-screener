name: Refresh Universe ETF Match DB

on:
  workflow_dispatch:
  schedule:
    - cron: "20 0 1 * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-earnings-growth.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh universe ETF match DB
        run: python scripts/build_universe_etf_match_db.py

      - name: Commit updated DB
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          DB_FILE="data/universe_etf_matches.sqlite"
          if git diff --quiet -- "$DB_FILE"; then
            echo "No universe ETF DB changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$DB_FILE"
          git commit -m "Refresh universe ETF match DB"
          git pull --rebase origin "${TARGET_BRANCH}"
          git push origin "HEAD:${TARGET_BRANCH}"
