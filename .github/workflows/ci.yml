name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-earnings-growth.txt
            requirements-web.txt

      - name: Install core dependencies
        run: python -m pip install -r requirements.txt -r requirements-web.txt

      - name: Compile Python sources
        run: python -m compileall src scripts web

      - name: Import web app
        run: python -c "import web.app"

      - name: Check deploy files
        run: |
          test -f deploy/docker-compose.yml
          test -f deploy/Caddyfile
          test -f deploy/.env.example
          test -f deploy/DEPLOY.md
          test -f sql/postgres_app_schema.sql
