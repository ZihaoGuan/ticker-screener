name: Daily Overlap Summary

on:
  workflow_dispatch:
    inputs:
      date_label:
        description: Optional date label override (YYYY-MM-DD)
        required: false
        type: string
  # schedule temporarily disabled

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  summarize:
    runs-on: ubuntu-latest
    outputs:
      date_label: ${{ steps.meta.outputs.date_label }}
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-earnings-growth.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt awscli

      - name: Compute date label
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.date_label }}" ]; then
            echo "date_label=${{ github.event.inputs.date_label }}" >> "$GITHUB_OUTPUT"
          else
            echo "date_label=$(date +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Download watchlists from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          DATE_LABEL: ${{ steps.meta.outputs.date_label }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/watchlists
          ENDPOINT_URL="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          fetch_or_warn() {
            local source_key="$1"
            local dest_path="$2"
            if aws --endpoint-url "$ENDPOINT_URL" s3 cp "s3://${R2_BUCKET}/${source_key}" "${dest_path}" 2>/dev/null; then
              echo "Downloaded ${source_key}"
            else
              echo "WARNING: missing ${source_key}"
            fi
          }

          fetch_or_warn "rs-screen/${DATE_LABEL}/watchlists/rs_new_high_before_price_${DATE_LABEL}.json" "artifacts/watchlists/rs_new_high_before_price_${DATE_LABEL}.json"
          fetch_or_warn "peg-screen/${DATE_LABEL}/watchlists/peg_earnings_gap_${DATE_LABEL}.json" "artifacts/watchlists/sean_peg_earnings_gap_${DATE_LABEL}.json"
          fetch_or_warn "legacy-peg-screen/${DATE_LABEL}/watchlists/peg_earnings_gap_${DATE_LABEL}.json" "artifacts/watchlists/legacy_peg_earnings_gap_${DATE_LABEL}.json"
          fetch_or_warn "vcp-screen/${DATE_LABEL}/watchlists/vcp_${DATE_LABEL}.json" "artifacts/watchlists/vcp_${DATE_LABEL}.json"
          fetch_or_warn "cup-handle-screen/${DATE_LABEL}/watchlists/cup_handle_${DATE_LABEL}.json" "artifacts/watchlists/cup_handle_${DATE_LABEL}.json"
          fetch_or_warn "weekly-htf-pullback-screen/${DATE_LABEL}/watchlists/weekly_htf_pullback_${DATE_LABEL}.json" "artifacts/watchlists/weekly_htf_pullback_${DATE_LABEL}.json"
          fetch_or_warn "8w-100-runup-screen/${DATE_LABEL}/watchlists/htf_8w_runup_${DATE_LABEL}.json" "artifacts/watchlists/htf_8w_runup_${DATE_LABEL}.json"
          fetch_or_warn "gap-fill-screen/${DATE_LABEL}/watchlists/gap_fill_${DATE_LABEL}.json" "artifacts/watchlists/gap_fill_${DATE_LABEL}.json"

      - name: Build overlap summary
        run: |
          python scripts/build_daily_overlap_summary.py \
            --date-label "${{ steps.meta.outputs.date_label }}"

      - name: Upload overlap artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-overlap-summary-${{ steps.meta.outputs.date_label }}
          path: |
            artifacts/raw/daily_overlap_summary_${{ steps.meta.outputs.date_label }}.json
            artifacts/raw/daily_overlap_summary_${{ steps.meta.outputs.date_label }}.txt
            artifacts/output/daily_overlap_summary_${{ steps.meta.outputs.date_label }}

  publish-r2:
    runs-on: ubuntu-latest
    needs: summarize
    if: ${{ needs.summarize.result == 'success' }}
    outputs:
      r2_prefix: ${{ steps.publish.outputs.r2_prefix }}
      r2_index_url: ${{ steps.publish.outputs.r2_index_url }}
    concurrency:
      group: r2-root-index-update
      cancel-in-progress: false
    steps:
      - name: Check R2 configuration
        id: r2-config
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          if [ -n "${R2_ACCOUNT_ID}" ] && [ -n "${R2_ACCESS_KEY_ID}" ] && [ -n "${R2_SECRET_ACCESS_KEY}" ] && [ -n "${R2_BUCKET}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: ${{ steps.r2-config.outputs.enabled == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Python
        if: ${{ steps.r2-config.outputs.enabled == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-earnings-growth.txt

      - name: Install AWS CLI
        if: ${{ steps.r2-config.outputs.enabled == 'true' }}
        run: python -m pip install awscli

      - name: Download overlap artifact
        if: ${{ steps.r2-config.outputs.enabled == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: daily-overlap-summary-${{ needs.summarize.outputs.date_label }}
          path: downloaded-overlap

      - name: Upload artifacts to R2
        id: publish
        if: ${{ steps.r2-config.outputs.enabled == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          DATE_LABEL: ${{ needs.summarize.outputs.date_label }}
        run: |
          set -euo pipefail
          R2_PREFIX="daily-overlap-summary/${DATE_LABEL}"
          ENDPOINT_URL="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          SUMMARY_FILE="$(find downloaded-overlap -type f -name "daily_overlap_summary_${DATE_LABEL}.json" | head -n 1)"
          SUMMARY_TEXT_FILE="$(find downloaded-overlap -type f -name "daily_overlap_summary_${DATE_LABEL}.txt" | head -n 1)"
          INDEX_FILE="$(find downloaded-overlap -type f -name "index.html" | grep "daily_overlap_summary_${DATE_LABEL}" | head -n 1 || true)"
          RENDER_DIR="$(dirname "${INDEX_FILE}")"
          RAW_RESULTS_URL="/${R2_PREFIX}/raw/daily_overlap_summary_${DATE_LABEL}.json"
          TEXT_URL="/${R2_PREFIX}/raw/daily_overlap_summary_${DATE_LABEL}.txt"
          INDEX_URL="/${R2_PREFIX}/rendered/index.html"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          echo "Resolved summary json: ${SUMMARY_FILE}"
          echo "Resolved summary txt: ${SUMMARY_TEXT_FILE}"
          echo "Resolved index html: ${INDEX_FILE}"
          echo "Resolved render dir: ${RENDER_DIR}"

          test -n "${SUMMARY_FILE}"
          test -n "${SUMMARY_TEXT_FILE}"
          test -n "${INDEX_FILE}"
          test -n "${RENDER_DIR}"
          test -f "${SUMMARY_FILE}"
          test -f "${SUMMARY_TEXT_FILE}"
          test -f "${INDEX_FILE}"
          test -d "${RENDER_DIR}"

          aws --endpoint-url "$ENDPOINT_URL" s3 cp \
            "${SUMMARY_FILE}" \
            "s3://${R2_BUCKET}/${R2_PREFIX}/raw/daily_overlap_summary_${DATE_LABEL}.json"

          aws --endpoint-url "$ENDPOINT_URL" s3 cp \
            "${SUMMARY_TEXT_FILE}" \
            "s3://${R2_BUCKET}/${R2_PREFIX}/raw/daily_overlap_summary_${DATE_LABEL}.txt"

          aws --endpoint-url "$ENDPOINT_URL" s3 cp \
            "${RENDER_DIR}/" \
            "s3://${R2_BUCKET}/${R2_PREFIX}/rendered/" \
            --recursive

          if [ -n "${R2_PUBLIC_BASE_URL}" ]; then
            BASE_URL="${R2_PUBLIC_BASE_URL%/}"
            RAW_RESULTS_URL="${BASE_URL}/${R2_PREFIX}/raw/daily_overlap_summary_${DATE_LABEL}.json"
            TEXT_URL="${BASE_URL}/${R2_PREFIX}/raw/daily_overlap_summary_${DATE_LABEL}.txt"
            INDEX_URL="${BASE_URL}/${R2_PREFIX}/rendered/index.html"
          fi

          mkdir -p artifacts/r2
          if aws --endpoint-url "$ENDPOINT_URL" s3 cp \
            "s3://${R2_BUCKET}/watchlist_index_manifest.json" \
            "artifacts/r2/watchlist_index_manifest.json" 2>/dev/null; then
            echo "Loaded existing root watchlist manifest from R2"
          else
            echo "No existing root watchlist manifest found in R2; starting fresh"
            echo '{"updated_at": null, "entries": []}' > artifacts/r2/watchlist_index_manifest.json
          fi

          export SUMMARY_FILE
          TOTAL_TICKERS=$(python -c 'import json, os; from pathlib import Path; p = Path(os.environ["SUMMARY_FILE"]); d = json.loads(p.read_text()); print(int(d.get("unique_ticker_count", 0)))')
          PASSED_TICKERS=$(python -c 'import json, os; from pathlib import Path; p = Path(os.environ["SUMMARY_FILE"]); d = json.loads(p.read_text()); print(len(d.get("overlap_two_plus", [])))')
          FAILURE_COUNT=$(python -c 'import json, os; from pathlib import Path; p = Path(os.environ["SUMMARY_FILE"]); d = json.loads(p.read_text()); print(len(d.get("missing_pipelines", [])))')

          python scripts/build_r2_root_index.py \
            --manifest-in artifacts/r2/watchlist_index_manifest.json \
            --manifest-out artifacts/r2/watchlist_index_manifest.json \
            --html-out artifacts/r2/index.html \
            --pipeline-id daily-overlap-summary \
            --pipeline-name "Daily Overlap Summary" \
            --date-label "${DATE_LABEL}" \
            --summary-file "${SUMMARY_FILE}" \
            --total-tickers "${TOTAL_TICKERS}" \
            --passed-tickers "${PASSED_TICKERS}" \
            --failure-count "${FAILURE_COUNT}" \
            --rendered-index-url "${INDEX_URL}" \
            --watchlist-url "${TEXT_URL}" \
            --raw-results-url "${RAW_RESULTS_URL}" \
            --run-url "${RUN_URL}" \
            --source-label "RS + Sean PEG + Legacy PEG + VCP + Cup and Handle + Weekly HTF 8W Pullback + 8W 100% Runup + Gap Fill"

          aws --endpoint-url "$ENDPOINT_URL" s3 cp \
            "artifacts/r2/watchlist_index_manifest.json" \
            "s3://${R2_BUCKET}/watchlist_index_manifest.json"

          aws --endpoint-url "$ENDPOINT_URL" s3 cp \
            "artifacts/r2/index.html" \
            "s3://${R2_BUCKET}/index.html"

          {
            echo "r2_prefix=${R2_PREFIX}"
            echo "r2_index_url=${INDEX_URL}"
          } >> "$GITHUB_OUTPUT"

  notify:
    runs-on: ubuntu-latest
    needs:
      - summarize
      - publish-r2
    if: ${{ always() }}
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download overlap artifact
        if: ${{ needs.summarize.result == 'success' && needs.summarize.outputs.date_label != '' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: daily-overlap-summary-${{ needs.summarize.outputs.date_label }}
          path: downloaded-overlap

      - name: Send Discord notification
        if: ${{ env.DISCORD_WEBHOOK_URL != '' && needs.summarize.result == 'success' }}
        env:
          DATE_LABEL: ${{ needs.summarize.outputs.date_label }}
          R2_INDEX_URL: ${{ needs.publish-r2.outputs.r2_index_url }}
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib

          date_label = "${{ needs.summarize.outputs.date_label }}"
          matches = list(pathlib.Path("downloaded-overlap").rglob(f"daily_overlap_summary_{date_label}.json"))
          if not matches:
              raise SystemExit(f"Could not find overlap summary json for {date_label}")
          path = matches[0]
          payload = json.loads(path.read_text(encoding="utf-8"))

          top_lines = []
          for item in payload.get("overlap_two_plus", [])[:12]:
              top_lines.append(f"{item['ticker']} ({'/'.join(item['pipeline_labels'])})")

          pipeline_status = payload.get("pipeline_status", [])
          status_lines = []
          for item in pipeline_status:
              label = item["label"]
              status = "ok" if item["file_present"] else "missing"
              status_lines.append(f"{label}: {item['count']} ({status})")

          summary_lines = [
              f"Daily overlap summary for {date_label}",
              f"Unique tickers: {payload.get('unique_ticker_count', 0)}",
              f"Overlap >=2: {len(payload.get('overlap_two_plus', []))}",
              f"Overlap >=3: {len(payload.get('overlap_three_plus', []))}",
              "Pipelines: " + " | ".join(status_lines),
          ]
          if top_lines:
              summary_lines.append("Top overlaps: " + ", ".join(top_lines))
          r2_index_url = os.environ.get("R2_INDEX_URL", "").strip()
          if r2_index_url:
              summary_lines.append(f"Report: {r2_index_url}")

          body = {"content": "\n".join(summary_lines)}
          pathlib.Path("discord_payload.json").write_text(json.dumps(body), encoding="utf-8")
          PY

      - name: Post Discord notification
        if: ${{ env.DISCORD_WEBHOOK_URL != '' && needs.summarize.result == 'success' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        continue-on-error: true
        run: |
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            --data @discord_payload.json \
            "$DISCORD_WEBHOOK_URL"
