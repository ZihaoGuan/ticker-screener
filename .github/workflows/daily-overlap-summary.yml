name: Daily Overlap Summary

on:
  workflow_dispatch:
    inputs:
      date_label:
        description: Optional date label override (YYYY-MM-DD)
        required: false
        type: string
  schedule:
    - cron: "30 1 * * 2-6"

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt awscli

      - name: Compute date label
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.date_label }}" ]; then
            echo "date_label=${{ github.event.inputs.date_label }}" >> "$GITHUB_OUTPUT"
          else
            echo "date_label=$(date +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Download watchlists from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          DATE_LABEL: ${{ steps.meta.outputs.date_label }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/watchlists
          ENDPOINT_URL="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          fetch_or_warn() {
            local source_key="$1"
            local dest_path="$2"
            if aws --endpoint-url "$ENDPOINT_URL" s3 cp "s3://${R2_BUCKET}/${source_key}" "${dest_path}" 2>/dev/null; then
              echo "Downloaded ${source_key}"
            else
              echo "WARNING: missing ${source_key}"
            fi
          }

          fetch_or_warn "rs-screen/${DATE_LABEL}/watchlists/rs_new_high_before_price_${DATE_LABEL}.json" "artifacts/watchlists/rs_new_high_before_price_${DATE_LABEL}.json"
          fetch_or_warn "peg-screen/${DATE_LABEL}/watchlists/peg_earnings_gap_${DATE_LABEL}.json" "artifacts/watchlists/peg_earnings_gap_${DATE_LABEL}.json"
          fetch_or_warn "vcp-screen/${DATE_LABEL}/watchlists/vcp_${DATE_LABEL}.json" "artifacts/watchlists/vcp_${DATE_LABEL}.json"

      - name: Build overlap summary
        run: |
          python scripts/build_daily_overlap_summary.py \
            --date-label "${{ steps.meta.outputs.date_label }}"

      - name: Upload overlap artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-overlap-summary-${{ steps.meta.outputs.date_label }}
          path: |
            artifacts/raw/daily_overlap_summary_${{ steps.meta.outputs.date_label }}.json
            artifacts/raw/daily_overlap_summary_${{ steps.meta.outputs.date_label }}.txt

      - name: Send Discord notification
        if: ${{ secrets.DISCORD_WEBHOOK_URL != '' }}
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DATE_LABEL: ${{ steps.meta.outputs.date_label }}
        run: |
          python - <<'PY'
          import json
          import pathlib
          import urllib.request

          date_label = "${{ steps.meta.outputs.date_label }}"
          path = pathlib.Path(f"artifacts/raw/daily_overlap_summary_{date_label}.json")
          payload = json.loads(path.read_text(encoding="utf-8"))

          overlap_two_plus = payload.get("overlap_two_plus", [])
          overlap_all_three = payload.get("overlap_all_three", [])
          top_lines = []
          for item in overlap_two_plus[:15]:
              top_lines.append(f"{item['ticker']} ({'/'.join(item['pipelines'])})")
          summary_lines = [
              f"Overlap summary for {date_label}",
              f"RS hits: {payload['pipeline_counts'].get('rs', 0)}",
              f"PEG hits: {payload['pipeline_counts'].get('peg', 0)}",
              f"VCP hits: {payload['pipeline_counts'].get('vcp', 0)}",
              f"Overlap >=2: {len(overlap_two_plus)}",
              f"Overlap all 3: {len(overlap_all_three)}",
          ]
          if top_lines:
              summary_lines.append("Top overlaps: " + ", ".join(top_lines))

          body = {"content": "\n".join(summary_lines)}
          req = urllib.request.Request(
              DISCORD_WEBHOOK_URL,
              data=json.dumps(body).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=20) as response:
              response.read()
          PY
