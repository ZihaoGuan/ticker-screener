name: Deploy Oracle Instance

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: false
        default: main
        type: string
      compose_command:
        description: Compose command after git pull
        required: false
        default: up -d
        type: string
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master'))
    runs-on: ubuntu-latest
    concurrency:
      group: oracle-instance-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GIT_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.event.workflow_run.head_branch }}
          COMPOSE_COMMAND: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.compose_command || 'up -d' }}
          APP_DIR: ${{ secrets.ORACLE_APP_DIR }}
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: ${{ secrets.ORACLE_PORT }}
          envs: GIT_REF,COMPOSE_COMMAND,APP_DIR
          script_stop: true
          script: |
            set -euo pipefail
            cd "${APP_DIR}"
            git fetch --all --prune
            git checkout "${GIT_REF}"
            git pull --ff-only origin "${GIT_REF}"
            docker run --rm \
              --user "$(id -u):$(id -g)" \
              -v "${APP_DIR}:/app" \
              -w /app/frontend \
              node:20 \
              sh -c "npm install && npm run build"
            cd deploy
            docker-compose down || true
            docker rm -f deploy_db_1 deploy_web_1 deploy_caddy_1 2>/dev/null || true
            docker-compose ${COMPOSE_COMMAND}
            docker-compose ps
