name: Deploy Oracle Instance

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: false
        default: main
        type: string
      compose_command:
        description: Compose command after git pull
        required: false
        default: up -d --no-deps web caddy
        type: string
      allow_active_remote_jobs:
        description: Allow deploy even when queued or running remote jobs exist
        required: false
        default: false
        type: boolean
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master'))
    runs-on: ubuntu-latest
    concurrency:
      group: oracle-instance-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GIT_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.event.workflow_run.head_branch }}
          COMPOSE_COMMAND: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.compose_command || 'up -d --no-deps web caddy' }}
          ALLOW_ACTIVE_REMOTE_JOBS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_active_remote_jobs || 'false' }}
          APP_DIR: ${{ secrets.ORACLE_APP_DIR }}
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: ${{ secrets.ORACLE_PORT }}
          envs: GIT_REF,COMPOSE_COMMAND,ALLOW_ACTIVE_REMOTE_JOBS,APP_DIR
          script_stop: true
          script: |
            set -euo pipefail
            cd "${APP_DIR}"
            BACKUP_DIR="$(mktemp -d)"
            PRESERVE_PATHS="config/smallcap_exclude_tickers.txt config/manual_exclude_tickers.txt config/manual_include_tickers.txt"
            for preserve_path in ${PRESERVE_PATHS}; do
              if [ -f "${preserve_path}" ]; then
                mkdir -p "${BACKUP_DIR}/$(dirname "${preserve_path}")"
                cp "${preserve_path}" "${BACKUP_DIR}/${preserve_path}"
              fi
            done
            RESTORE_PATHS="frontend/package-lock.json ${PRESERVE_PATHS}"
            git fetch --all --prune
            git checkout "${GIT_REF}"
            for restore_path in ${RESTORE_PATHS}; do
              if git ls-files --error-unmatch -- "${restore_path}" >/dev/null 2>&1; then
                git restore --source=HEAD --worktree --staged -- "${restore_path}" || true
              fi
            done
            git clean -fd -- frontend/package-lock.json frontend/dist frontend/tsconfig.app.tsbuildinfo frontend/tsconfig.node.tsbuildinfo frontend/vite.config.js frontend/vite.config.d.ts
            git pull --ff-only origin "${GIT_REF}"
            for preserve_path in ${PRESERVE_PATHS}; do
              if [ -f "${BACKUP_DIR}/${preserve_path}" ]; then
                cp "${BACKUP_DIR}/${preserve_path}" "${preserve_path}"
              fi
            done
            cd deploy
            DB_CONTAINER_ID="$(docker-compose ps -q db || true)"
            if [ -n "${DB_CONTAINER_ID}" ] && [ "$(docker inspect -f '{{.State.Running}}' "${DB_CONTAINER_ID}" 2>/dev/null || echo false)" = "true" ]; then
              POSTGRES_USER_IN_CONTAINER="$(docker-compose exec -T db printenv POSTGRES_USER | tr -d '\r')"
              POSTGRES_DB_IN_CONTAINER="$(docker-compose exec -T db printenv POSTGRES_DB | tr -d '\r')"
              ACTIVE_REMOTE_COUNT="$(docker-compose exec -T db psql -U "${POSTGRES_USER_IN_CONTAINER}" -d "${POSTGRES_DB_IN_CONTAINER}" -Atqc "SELECT COUNT(*) FROM job_runs WHERE status IN ('queued', 'running') AND COALESCE(request_payload->>'execution_mode', 'local') = 'remote';")"
              ACTIVE_REMOTE_COUNT="${ACTIVE_REMOTE_COUNT:-0}"
              if [ "${ACTIVE_REMOTE_COUNT}" != "0" ]; then
                case "${ALLOW_ACTIVE_REMOTE_JOBS:-false}" in
                  true|TRUE|1|yes|YES)
                    echo "Proceeding despite ${ACTIVE_REMOTE_COUNT} active remote job(s) because allow_active_remote_jobs=${ALLOW_ACTIVE_REMOTE_JOBS}."
                    ;;
                  *)
                    echo "Blocked deploy: found ${ACTIVE_REMOTE_COUNT} active remote job(s)."
                    echo "Active remote jobs:"
                    docker-compose exec -T db psql -U "${POSTGRES_USER_IN_CONTAINER}" -d "${POSTGRES_DB_IN_CONTAINER}" -Atqc "SELECT id || ' | ' || job_name || ' | status=' || status || ' | target_worker=' || COALESCE(request_payload->>'target_worker', '') FROM job_runs WHERE status IN ('queued', 'running') AND COALESCE(request_payload->>'execution_mode', 'local') = 'remote' ORDER BY created_at ASC LIMIT 20;"
                    echo "Wait for remote jobs to finish, or rerun manual deploy with allow_active_remote_jobs=true if you accept the risk."
                    exit 1
                    ;;
                esac
              fi
            else
              echo "Skipping active remote job check because db container is not currently running."
            fi
            cd "${APP_DIR}"
            docker run --rm --user "$(id -u):$(id -g)" -e HOME=/tmp/npm-home -e npm_config_cache=/tmp/npm-cache -v "${APP_DIR}:/app" -w /app/frontend node:20 sh -c "mkdir -p /tmp/npm-home /tmp/npm-cache && npm ci && npm run build"
            cd deploy
            docker-compose ${COMPOSE_COMMAND}
            docker-compose ps
