name: Deploy Oracle Instance

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: false
        default: main
        type: string
      compose_command:
        description: Compose command after git pull
        required: false
        default: up -d --no-deps web caddy
        type: string
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master'))
    runs-on: ubuntu-latest
    concurrency:
      group: oracle-instance-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GIT_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.event.workflow_run.head_branch }}
          COMPOSE_COMMAND: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.compose_command || 'up -d --no-deps web caddy' }}
          APP_DIR: ${{ secrets.ORACLE_APP_DIR }}
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: ${{ secrets.ORACLE_PORT }}
          envs: GIT_REF,COMPOSE_COMMAND,APP_DIR
          script_stop: true
          script: |
            set -euo pipefail
            compose() {
              if docker compose version >/dev/null 2>&1; then
                docker compose "$@"
              else
                docker-compose "$@"
              fi
            }
            cd "${APP_DIR}"
            BACKUP_DIR="$(mktemp -d)"
            PRESERVE_PATHS="config/smallcap_exclude_tickers.txt config/manual_exclude_tickers.txt config/manual_include_tickers.txt"
            for preserve_path in ${PRESERVE_PATHS}; do
              if [ -f "${preserve_path}" ]; then
                mkdir -p "${BACKUP_DIR}/$(dirname "${preserve_path}")"
                cp "${preserve_path}" "${BACKUP_DIR}/${preserve_path}"
              fi
            done
            RESTORE_PATHS="frontend/package-lock.json ${PRESERVE_PATHS}"
            git fetch --all --prune
            git checkout "${GIT_REF}"
            for restore_path in ${RESTORE_PATHS}; do
              if git ls-files --error-unmatch -- "${restore_path}" >/dev/null 2>&1; then
                git restore --source=HEAD --worktree --staged -- "${restore_path}" || true
              fi
            done
            git clean -fd -- frontend/package-lock.json frontend/dist frontend/tsconfig.app.tsbuildinfo frontend/tsconfig.node.tsbuildinfo frontend/vite.config.js frontend/vite.config.d.ts
            git pull --ff-only origin "${GIT_REF}"
            for preserve_path in ${PRESERVE_PATHS}; do
              if [ -f "${BACKUP_DIR}/${preserve_path}" ]; then
                cp "${BACKUP_DIR}/${preserve_path}" "${preserve_path}"
              fi
            done
            cd "${APP_DIR}"
            docker run --rm --user "$(id -u):$(id -g)" -e HOME=/tmp/npm-home -e npm_config_cache=/tmp/npm-cache -v "${APP_DIR}:/app" -w /app/frontend node:20 sh -c "mkdir -p /tmp/npm-home /tmp/npm-cache && npm ci && npm run build"
            cd deploy
            echo "Compose command: ${COMPOSE_COMMAND}"
            if docker compose version >/dev/null 2>&1; then
              COMPOSE_IMPL="docker compose"
              echo "Using docker compose plugin"
              docker compose version
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_IMPL="docker-compose"
              echo "Using legacy docker-compose binary"
              docker-compose version
            else
              echo "No compose command available on server"
              exit 1
            fi
            if [ "${COMPOSE_IMPL}" = "docker-compose" ]; then
              echo "Legacy docker-compose detected. Pre-cleaning stale web/caddy containers."
              docker rm -f deploy_web_1 deploy_caddy_1 >/dev/null 2>&1 || true
              docker ps -a --format '{{.Names}}' | grep -E '_deploy_(web|caddy)_1$' | xargs -r docker rm -f || true
            fi
            set +e
            compose ${COMPOSE_COMMAND} > /tmp/codex-compose-attempt1.log 2>&1
            COMPOSE_STATUS=$?
            set -e
            cat /tmp/codex-compose-attempt1.log
            if [ "${COMPOSE_STATUS}" -ne 0 ]; then
              echo "First compose attempt failed. Removing stale web/caddy containers and retrying once."
              docker rm -f deploy_web_1 deploy_caddy_1 >/dev/null 2>&1 || true
              docker ps -a --format '{{.Names}}' | grep -E '_deploy_(web|caddy)_1$' | xargs -r docker rm -f || true
              set +e
              compose ${COMPOSE_COMMAND} > /tmp/codex-compose-attempt2.log 2>&1
              COMPOSE_STATUS=$?
              set -e
              cat /tmp/codex-compose-attempt2.log
              if [ "${COMPOSE_STATUS}" -ne 0 ]; then
                echo "Second compose attempt failed."
                exit "${COMPOSE_STATUS}"
              fi
            fi
            compose ps
