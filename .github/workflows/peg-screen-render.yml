name: PEG Screen And Render

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Optional candidate limit for smoke runs
        required: false
        type: string
  schedule:
    - cron: "15 0 * * 2-6"
    - cron: "15 23 * * 1-5"

jobs:
  screen:
    runs-on: ubuntu-latest
    outputs:
      date_label: ${{ steps.meta.outputs.date_label }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compute artifact metadata
        id: meta
        run: echo "date_label=$(date +%F)" >> "$GITHUB_OUTPUT"

      - name: Run PEG screen
        env:
          MPLBACKEND: Agg
          MPLCONFIGDIR: /tmp/mpl
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            python scripts/run_peg_screen.py --limit "${{ github.event.inputs.limit }}"
          else
            python scripts/run_peg_screen.py
          fi

      - name: Upload raw results
        uses: actions/upload-artifact@v4
        with:
          name: peg-screen-raw-${{ steps.meta.outputs.date_label }}
          path: |
            artifacts/raw/peg_earnings_gap_${{ steps.meta.outputs.date_label }}.json
            artifacts/raw/peg_run_summary_${{ steps.meta.outputs.date_label }}.json

      - name: Upload watchlist
        uses: actions/upload-artifact@v4
        with:
          name: peg-screen-watchlist-${{ steps.meta.outputs.date_label }}
          path: artifacts/watchlists/peg_earnings_gap_${{ steps.meta.outputs.date_label }}.json

  render:
    runs-on: ubuntu-latest
    needs: screen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Download watchlist artifact
        uses: actions/download-artifact@v4
        with:
          name: peg-screen-watchlist-${{ needs.screen.outputs.date_label }}
          path: artifacts/watchlists

      - name: Resolve watchlist path
        run: |
          WATCHLIST_FILE="$(find artifacts/watchlists -name 'peg_earnings_gap_*.json' | head -n 1)"
          echo "WATCHLIST_FILE=$WATCHLIST_FILE" >> "$GITHUB_ENV"

      - name: Render charts
        env:
          MPLBACKEND: Agg
          MPLCONFIGDIR: /tmp/mpl
        run: |
          python scripts/render_rs_watchlist.py \
            --watchlist-file "$WATCHLIST_FILE" \
            --output-dir "artifacts/output/peg_earnings_gap_${{ needs.screen.outputs.date_label }}"

      - name: Upload rendered charts
        uses: actions/upload-artifact@v4
        with:
          name: peg-screen-rendered-${{ needs.screen.outputs.date_label }}
          path: artifacts/output/peg_earnings_gap_${{ needs.screen.outputs.date_label }}

  publish-r2:
    runs-on: ubuntu-latest
    needs:
      - screen
      - render
    if: ${{ needs.screen.result == 'success' && needs.render.result == 'success' }}
    concurrency:
      group: r2-root-index-update
      cancel-in-progress: false
    outputs:
      r2_prefix: ${{ steps.publish.outputs.r2_prefix }}
      r2_index_url: ${{ steps.publish.outputs.r2_index_url }}
    steps:
      - name: Check R2 configuration
        id: r2-config
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          if [ -n "${R2_ACCOUNT_ID}" ] && [ -n "${R2_ACCESS_KEY_ID}" ] && [ -n "${R2_SECRET_ACCESS_KEY}" ] && [ -n "${R2_BUCKET}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: ${{ steps.r2-config.outputs.enabled == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Python
        if: ${{ steps.r2-config.outputs.enabled == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AWS CLI
        if: ${{ steps.r2-config.outputs.enabled == 'true' }}
        run: python -m pip install awscli

      - name: Download raw results artifact
        if: ${{ steps.r2-config.outputs.enabled == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: peg-screen-raw-${{ needs.screen.outputs.date_label }}
          path: artifacts/raw

      - name: Download watchlist artifact
        if: ${{ steps.r2-config.outputs.enabled == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: peg-screen-watchlist-${{ needs.screen.outputs.date_label }}
          path: artifacts/watchlists

      - name: Download rendered charts artifact
        if: ${{ steps.r2-config.outputs.enabled == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: peg-screen-rendered-${{ needs.screen.outputs.date_label }}
          path: artifacts/output/peg_earnings_gap_${{ needs.screen.outputs.date_label }}

      - name: Upload artifacts to R2
        id: publish
        if: ${{ steps.r2-config.outputs.enabled == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          DATE_LABEL: ${{ needs.screen.outputs.date_label }}
        run: |
          set -euo pipefail
          R2_PREFIX="peg-screen/${DATE_LABEL}"
          ENDPOINT_URL="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          SUMMARY_FILE="artifacts/raw/peg_run_summary_${DATE_LABEL}.json"
          RAW_RESULTS_URL="/${R2_PREFIX}/raw/peg_earnings_gap_${DATE_LABEL}.json"
          WATCHLIST_URL="/${R2_PREFIX}/watchlists/peg_earnings_gap_${DATE_LABEL}.json"
          INDEX_URL="/${R2_PREFIX}/rendered/index.html"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          aws --endpoint-url "$ENDPOINT_URL" s3 cp \
            "artifacts/raw/" \
            "s3://${R2_BUCKET}/${R2_PREFIX}/raw/" \
            --recursive

          aws --endpoint-url "$ENDPOINT_URL" s3 cp \
            "artifacts/watchlists/" \
            "s3://${R2_BUCKET}/${R2_PREFIX}/watchlists/" \
            --recursive

          aws --endpoint-url "$ENDPOINT_URL" s3 cp \
            "artifacts/output/peg_earnings_gap_${DATE_LABEL}/" \
            "s3://${R2_BUCKET}/${R2_PREFIX}/rendered/" \
            --recursive

          if [ -n "${R2_PUBLIC_BASE_URL}" ]; then
            BASE_URL="${R2_PUBLIC_BASE_URL%/}"
            RAW_RESULTS_URL="${BASE_URL}/${R2_PREFIX}/raw/peg_earnings_gap_${DATE_LABEL}.json"
            WATCHLIST_URL="${BASE_URL}/${R2_PREFIX}/watchlists/peg_earnings_gap_${DATE_LABEL}.json"
            INDEX_URL="${BASE_URL}/${R2_PREFIX}/rendered/index.html"
          fi

          mkdir -p artifacts/r2
          if aws --endpoint-url "$ENDPOINT_URL" s3 cp \
            "s3://${R2_BUCKET}/watchlist_index_manifest.json" \
            "artifacts/r2/watchlist_index_manifest.json" 2>/dev/null; then
            echo "Loaded existing root watchlist manifest from R2"
          else
            echo "No existing root watchlist manifest found in R2; starting fresh"
            echo '{"updated_at": null, "entries": []}' > artifacts/r2/watchlist_index_manifest.json
          fi

          if [ -f "scripts/build_r2_root_index.py" ]; then
            python scripts/build_r2_root_index.py \
              --manifest-in artifacts/r2/watchlist_index_manifest.json \
              --manifest-out artifacts/r2/watchlist_index_manifest.json \
              --html-out artifacts/r2/index.html \
              --pipeline-id peg-screen \
              --pipeline-name "PEG Earnings Gap" \
              --date-label "${DATE_LABEL}" \
              --summary-file "${SUMMARY_FILE}" \
              --rendered-index-url "${INDEX_URL}" \
              --watchlist-url "${WATCHLIST_URL}" \
              --raw-results-url "${RAW_RESULTS_URL}" \
              --run-url "${RUN_URL}"

            aws --endpoint-url "$ENDPOINT_URL" s3 cp \
              "artifacts/r2/watchlist_index_manifest.json" \
              "s3://${R2_BUCKET}/watchlist_index_manifest.json"

            aws --endpoint-url "$ENDPOINT_URL" s3 cp \
              "artifacts/r2/index.html" \
              "s3://${R2_BUCKET}/index.html"
          else
            echo "WARNING: scripts/build_r2_root_index.py is missing; skipping root R2 index refresh"
          fi

          {
            echo "r2_prefix=${R2_PREFIX}"
            echo "r2_index_url=${INDEX_URL}"
          } >> "$GITHUB_OUTPUT"

  notify:
    runs-on: ubuntu-latest
    needs:
      - screen
      - render
      - publish-r2
    if: ${{ always() }}
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download raw results artifact
        if: ${{ needs.screen.result == 'success' && needs.screen.outputs.date_label != '' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: peg-screen-raw-${{ needs.screen.outputs.date_label }}
          path: artifacts/raw

      - name: Build Discord payload
        env:
          DATE_LABEL: ${{ needs.screen.outputs.date_label }}
          SCREEN_RESULT: ${{ needs.screen.result }}
          RENDER_RESULT: ${{ needs.render.result }}
          PUBLISH_RESULT: ${{ needs.publish-r2.result }}
          R2_INDEX_URL: ${{ needs.publish-r2.outputs.r2_index_url }}
          R2_PREFIX: ${{ needs.publish-r2.outputs.r2_prefix }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          from pathlib import Path
          import urllib.error
          import urllib.request

          date_label = os.getenv("DATE_LABEL") or "unknown-date"
          screen_result = os.getenv("SCREEN_RESULT", "unknown")
          render_result = os.getenv("RENDER_RESULT", "unknown")
          publish_result = os.getenv("PUBLISH_RESULT", "skipped")
          r2_index_url = os.getenv("R2_INDEX_URL", "").strip()
          r2_prefix = os.getenv("R2_PREFIX", "").strip()
          r2_public_base_url = os.getenv("R2_PUBLIC_BASE_URL", "").strip().rstrip("/")
          run_url = os.getenv("GITHUB_RUN_URL", "")
          success = screen_result == "success" and render_result == "success"

          if not r2_index_url and r2_public_base_url and r2_prefix:
              r2_index_url = f"{r2_public_base_url}/{r2_prefix}/rendered/index.html"

          summary_path = Path("artifacts/raw") / f"peg_run_summary_{date_label}.json"
          raw_results_path = Path("artifacts/raw") / f"peg_earnings_gap_{date_label}.json"
          total_tickers = "n/a"
          passed_tickers = "n/a"
          failed_tickers = "n/a"
          current_hits = []
          hit_summaries = []
          new_tickers: set[str] = set()

          if summary_path.exists():
              summary = json.loads(summary_path.read_text(encoding="utf-8"))
              total_tickers = summary.get("total_tickers", "n/a")
              passed_tickers = summary.get("passed_tickers", "n/a")
              failures = summary.get("failed_tickers", [])
              failed_tickers = len(failures) if isinstance(failures, list) else "n/a"

          if raw_results_path.exists():
              raw_results = json.loads(raw_results_path.read_text(encoding="utf-8"))
              hits = raw_results.get("hits", [])
              if isinstance(hits, list):
                  current_hits = [hit for hit in hits if isinstance(hit, dict)]

          previous_hits_by_ticker: set[str] = set()
          if r2_public_base_url:
              try:
                  previous_date = (dt.date.fromisoformat(date_label) - dt.timedelta(days=1)).isoformat()
                  previous_url = (
                      f"{r2_public_base_url}/peg-screen/{previous_date}/raw/"
                      f"peg_earnings_gap_{previous_date}.json"
                  )
                  with urllib.request.urlopen(previous_url, timeout=15) as response:
                      previous_payload = json.loads(response.read().decode("utf-8"))
                  previous_hits = previous_payload.get("hits", [])
                  if isinstance(previous_hits, list):
                      previous_hits_by_ticker = {
                          str(hit.get("ticker", "")).strip()
                          for hit in previous_hits
                          if isinstance(hit, dict) and str(hit.get("ticker", "")).strip()
                      }
              except (ValueError, urllib.error.URLError, TimeoutError, json.JSONDecodeError):
                  previous_hits_by_ticker = set()

          def score_of(hit):
              try:
                  return float(hit.get("gap_pct", 0))
              except (TypeError, ValueError):
                  return 0.0

          for hit in sorted(current_hits, key=score_of, reverse=True):
              ticker = str(hit.get("ticker", "")).strip()
              if not ticker:
                  continue
              is_new = ticker not in previous_hits_by_ticker if previous_hits_by_ticker else False
              if is_new:
                  new_tickers.add(ticker)
              gap_pct = score_of(hit) * 100.0
              volume_ratio = hit.get("volume_ratio")
              try:
                  volume_ratio_text = f"{float(volume_ratio):.2f}x"
              except (TypeError, ValueError):
                  volume_ratio_text = "n/a"
              prefix = "NEW " if is_new else ""
              hit_summaries.append(f"{prefix}`{ticker}` gap {gap_pct:.1f}% vol {volume_ratio_text}")

          status_emoji = ":white_check_mark:" if success else ":warning:"
          lines = [
              f"{status_emoji} PEG screen pipeline finished for `{date_label}`",
              f"Screen job: `{screen_result}`",
              f"Render job: `{render_result}`",
              f"R2 publish job: `{publish_result}`",
              f"Tickers screened: `{total_tickers}`",
              f"Hits: `{passed_tickers}`",
              f"Failures: `{failed_tickers}`",
          ]
          if previous_hits_by_ticker:
              lines.append(f"New vs prior day: `{len(new_tickers)}`")
          if r2_index_url:
              lines.append(f"Rendered charts: {r2_index_url}")
          elif r2_prefix:
              lines.append(f"R2 prefix: `{r2_prefix}`")
          if run_url:
              lines.append(f"Run details: {run_url}")

          payloads: list[dict[str, str]] = [{"content": "\n".join(lines)}]
          if hit_summaries:
              header = "Hit list (`NEW` means not in prior day PEG hits):" if previous_hits_by_ticker else "Hit list:"
              current = header
              limit = 1800
              for item in hit_summaries:
                  candidate = f"{current}\n{item}"
                  if len(candidate) > limit and current != header:
                      payloads.append({"content": current})
                      current = f"{header}\n{item}"
                  else:
                      current = candidate
              if current != header:
                  payloads.append({"content": current})

          Path("discord_payloads.json").write_text(json.dumps(payloads), encoding="utf-8")
          PY

      - name: Send Discord notification
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          webhook = os.environ["DISCORD_WEBHOOK_URL"]
          payloads = json.loads(open("discord_payloads.json", encoding="utf-8").read())
          for payload in payloads:
              request = urllib.request.Request(
                  webhook,
                  data=json.dumps(payload).encode("utf-8"),
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(request) as response:
                  response.read()
          PY
