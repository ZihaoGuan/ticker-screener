name: Pre-Earnings Smoke

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Optional universe limit for the smoke run
        required: false
        default: "100"
        type: string
  schedule:
    - cron: "0 0 * * 6"

jobs:
  smoke:
    runs-on: ubuntu-latest
    outputs:
      date_label: ${{ steps.meta.outputs.date_label }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compute artifact metadata
        id: meta
        run: echo "date_label=$(date +%F)" >> "$GITHUB_OUTPUT"

      - name: Run pre-earnings smoke
        env:
          MPLBACKEND: Agg
          MPLCONFIGDIR: /tmp/mpl
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -z "${LIMIT}" ]; then
            LIMIT="100"
          fi
          python scripts/pre_earnings_smoke.py --limit "${LIMIT}"

      - name: Upload smoke results
        uses: actions/upload-artifact@v4
        with:
          name: pre-earnings-smoke-${{ steps.meta.outputs.date_label }}
          path: vendor/cookstock/results/${{ steps.meta.outputs.date_label }}/pre_earnings_smoke.json
