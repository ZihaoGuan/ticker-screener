name: Refresh Small-Cap Exclusion List

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-earnings-growth.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh small-cap exclusion list
        run: python scripts/refresh_smallcap_exclusion.py

      - name: Commit updated list
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if git diff --quiet -- config/smallcap_exclude_tickers.txt; then
            echo "No small-cap exclusion changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/smallcap_exclude_tickers.txt
          git commit -m "Refresh small-cap exclusion list"
          git push origin "HEAD:${TARGET_BRANCH}"
