services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      TICKER_SCREENER_APP_ENV: ${APP_ENV}
      TICKER_SCREENER_APP_TITLE: ${APP_TITLE}
      TICKER_SCREENER_DATABASE_URL: ${TICKER_SCREENER_DATABASE_URL}
      TICKER_SCREENER_ARTIFACTS_DIR: /artifacts
      TICKER_SCREENER_OUTPUT_DIR: /artifacts/output
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt -r requirements-web.txt &&
             uvicorn web.app:app --host 0.0.0.0 --port 8000"
    volumes:
      - ..:/app
      - ../artifacts:/artifacts
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ../artifacts:/artifacts
      - ../frontend/dist:/srv/frontend
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
