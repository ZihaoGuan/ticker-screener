{% extends "base.html" %}

{% block content %}
<section class="band">
  <div class="section-head">
    <h1>{{ stem }}</h1>
    <span class="muted">{{ entry_count }} entries</span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Ticker</th>
          <th>Setup</th>
          <th>Summary</th>
        </tr>
      </thead>
      <tbody>
        {% for item in entries %}
        <tr>
          <td>{{ item.get("ticker", "") }}</td>
          <td>{{ item.get("setup_label", "") }}</td>
          <td>{{ item.get("summary", "") }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
